<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flash Card UPRAK — Kelas 6 SD</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📚 Flash Card UPRAK</h1>
    <p>Kelas 6 SD — Fotosintesis &amp; Alat Gerak</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active-foto" id="tab-foto">🌿 Fotosintesis</button>
    <button class="tab-btn" id="tab-gerak">🦴 Alat Gerak</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-text">Kartu 1 dari 10</span>
      <span id="prog-pct">10%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-fill" style="width:10%"></div>
    </div>
  </div>

  <div class="card-scene" id="cardScene">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-topic-badge badge-foto" id="frontBadge">Pertanyaan</div>
        <div class="card-emoji" id="cardEmoji"></div>
        <div class="card-question" id="cardQuestion"></div>
        <div class="card-hint">Ketuk kartu untuk lihat jawaban 👆</div>
      </div>
      <div class="card-face card-back">
        <div class="card-answer-label" id="backBadge">Jawaban</div>
        <div class="card-answer" id="cardAnswer"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn">← Prev</button>
    <button class="ctrl-btn ctrl-flip tema-foto" id="flipBtn">Balik Kartu</button>
    <button class="ctrl-btn" id="nextBtn">Next →</button>
  </div>

  <div class="dots" id="dots"></div>

  <script src="script.js"></script>
</body>
</html>
